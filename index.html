<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polla Mundial 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0D16;
      --surface: #151B2C;
      --line: #2A3349;
      --lime: #C9FF3D;
      --coral: #FF5A3C;
      --gold: #FFC93C;
      --text: #F3F4EE;
      --muted: #8A90A6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    .container { max-width: 920px; margin: 0 auto; padding: 18px 14px; }
    h1 { font-family: 'Anton', sans-serif; font-size: 28px; margin-bottom: 8px; }
    h2 { font-family: 'Anton', sans-serif; font-size: 18px; margin-bottom: 12px; color: var(--lime); }
    p { color: var(--muted); font-size: 12px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
    input, select { width: 100%; background: #0F1422; border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 10px; margin-bottom: 12px; font-family: inherit; }
    button { width: 100%; background: var(--lime); color: var(--bg); border: none; border-radius: 8px; padding: 12px; font-weight: 700; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { flex: 1; min-width: 100px; background: #1C2438; color: var(--muted); border: 1px solid var(--line); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    .tab-btn.active { background: var(--lime); color: var(--bg); }
    .hidden { display: none; }
    .badge { background: rgba(201,255,61,.15); color: var(--lime); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; margin-right: 6px; }
    .match { background: #0F1422; border: 1px solid #1C2438; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .match-inputs { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .match-inputs input { margin: 0; width: 50px; text-align: center; }
    .loading { text-align: center; color: var(--muted); padding: 40px; }
    table { width: 100%; border-collapse: collapse; }
    table td { padding: 10px; border-bottom: 1px solid var(--line); }
    table th { background: #0F1422; padding: 10px; text-align: left; font-weight: 700; }
    hr { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div id="app"></div>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient('https://rklimxsgnfdsnmxpfbgs.supabase.co', 'sb_publishable_p31XLskmCvUgg2GSYbbcyQ_UYSqUiny');
    
    const SCHEDULE = [
      ["México","Sudáfrica","A","2026-06-11T15:00"],["Corea del Sur","República Checa","A","2026-06-11T22:00"],
      ["Canadá","Bosnia y Herzegovina","B","2026-06-12T15:00"],["Estados Unidos","Paraguay","D","2026-06-12T21:00"],
      ["Catar","Suiza","B","2026-06-13T15:00"],["Brasil","Marruecos","C","2026-06-13T18:00"],
      ["Haití","Escocia","C","2026-06-13T21:00"],["Australia","Turquía","D","2026-06-14T00:00"],
      ["Alemania","Curazao","E","2026-06-14T13:00"],["Países Bajos","Japón","F","2026-06-14T16:00"],
      ["Costa de Marfil","Ecuador","E","2026-06-14T19:00"],["Suecia","Túnez","F","2026-06-14T22:00"],
      ["España","Cabo Verde","H","2026-06-15T12:00"],["Bélgica","Egipto","G","2026-06-15T15:00"],
      ["Arabia Saudí","Uruguay","H","2026-06-15T18:00"],["Irán","Nueva Zelanda","G","2026-06-15T21:00"],
      ["Francia","Senegal","I","2026-06-16T15:00"],["Irak","Noruega","I","2026-06-16T18:00"],
      ["Argentina","Argelia","J","2026-06-16T21:00"],["Austria","Jordania","J","2026-06-17T00:00"],
      ["Portugal","R.D. del Congo","K","2026-06-17T13:00"],["Inglaterra","Croacia","L","2026-06-17T16:00"],
      ["Ghana","Panamá","L","2026-06-17T19:00"],["Uzbekistán","Colombia","K","2026-06-17T22:00"],
      ["República Checa","Sudáfrica","A","2026-06-18T12:00"],["Suiza","Bosnia y Herzegovina","B","2026-06-18T15:00"],
      ["Canadá","Catar","B","2026-06-18T18:00"],["México","Corea del Sur","A","2026-06-18T21:00"],
      ["Estados Unidos","Australia","D","2026-06-19T15:00"],["Escocia","Marruecos","C","2026-06-19T18:00"],
      ["Brasil","Haití","C","2026-06-19T21:00"],["Turquía","Paraguay","D","2026-06-20T00:00"],
      ["Países Bajos","Suecia","F","2026-06-20T13:00"],["Alemania","Costa de Marfil","E","2026-06-20T16:00"],
      ["Ecuador","Curazao","E","2026-06-20T22:00"],["Túnez","Japón","F","2026-06-21T00:00"],
      ["España","Arabia Saudí","H","2026-06-21T12:00"],["Bélgica","Irán","G","2026-06-21T15:00"],
      ["Uruguay","Cabo Verde","H","2026-06-21T18:00"],["Nueva Zelanda","Egipto","G","2026-06-21T21:00"],
      ["Argentina","Austria","J","2026-06-22T13:00"],["Francia","Irak","I","2026-06-22T17:00"],
      ["Noruega","Senegal","I","2026-06-22T20:00"],["Jordania","Argelia","J","2026-06-22T23:00"],
      ["Portugal","Uzbekistán","K","2026-06-23T13:00"],["Inglaterra","Ghana","L","2026-06-23T16:00"],
      ["Panamá","Croacia","L","2026-06-23T19:00"],["Colombia","R.D. del Congo","K","2026-06-23T22:00"],
      ["Suiza","Canadá","B","2026-06-24T15:00"],["Bosnia y Herzegovina","Catar","B","2026-06-24T15:00"],
      ["Escocia","Brasil","C","2026-06-24T18:00"],["Marruecos","Haití","C","2026-06-24T18:00"],
      ["República Checa","México","A","2026-06-24T21:00"],["Sudáfrica","Corea del Sur","A","2026-06-24T21:00"],
      ["Curazao","Costa de Marfil","E","2026-06-25T16:00"],["Ecuador","Alemania","E","2026-06-25T16:00"],
      ["Japón","Suecia","F","2026-06-25T19:00"],["Túnez","Países Bajos","F","2026-06-25T19:00"],
      ["Turquía","Estados Unidos","D","2026-06-25T22:00"],["Paraguay","Australia","D","2026-06-25T22:00"],
      ["Noruega","Francia","I","2026-06-26T15:00"],["Senegal","Irak","I","2026-06-26T15:00"],
      ["Cabo Verde","Arabia Saudí","H","2026-06-26T20:00"],["Uruguay","España","H","2026-06-26T20:00"],
      ["Egipto","Irán","G","2026-06-26T23:00"],["Nueva Zelanda","Bélgica","G","2026-06-26T23:00"],
      ["Panamá","Inglaterra","L","2026-06-27T17:00"],["Croacia","Ghana","L","2026-06-27T17:00"],
      ["Colombia","Portugal","K","2026-06-27T19:30"],["R.D. del Congo","Uzbekistán","K","2026-06-27T19:30"],
      ["Argelia","Austria","J","2026-06-27T22:00"],["Jordania","Argentina","J","2026-06-27T22:00"],
    ];

    let state = { me: null, tab: 'partidos', config: null, users: {}, matches: [], preds: [], podium: {} };
    const appEl = document.getElementById('app');

    async function init() {
      appEl.innerHTML = '<div class="loading">Inicializando...</div>';
      
      try {
        const config = await sb.from('config').select('*').limit(1);
        if(config.data && config.data.length) {
          state.config = config.data[0];
        }
        
        const matches = await sb.from('matches').select('*');
        if(matches.data && matches.data.length) {
          state.matches = matches.data;
        } else {
          for(let i = 0; i < SCHEDULE.length; i++) {
            const x = SCHEDULE[i];
            await sb.from('matches').insert([{ id: 'm' + (i+1), home: x[0], away: x[1], group_name: x[2], datetime: x[3], homeScore: '', awayScore: '', finished: false }]);
          }
          state.matches = SCHEDULE.map((x, i) => ({ id: 'm' + (i+1), home: x[0], away: x[1], group_name: x[2], datetime: x[3], homeScore: '', awayScore: '', finished: false }));
        }
        
        const preds = await sb.from('predictions').select('*');
        state.preds = preds.data || [];
        
        if(!state.config) {
          render();
        } else {
          render();
        }
      } catch(e) {
        console.error(e);
        render();
      }
    }

    function render() {
      if(!state.config) {
        appEl.innerHTML = `
          <div class="card">
            <h1>Crear la polla</h1>
            <input type="text" id="poolName" placeholder="Nombre de la polla" value="Polla Mundial 2026">
            <input type="text" id="adminName" placeholder="Tu nombre">
            <input type="password" id="adminPw" placeholder="Tu contraseña">
            <button onclick="createPool()">Crear</button>
          </div>
        `;
      } else if(!state.me) {
        appEl.innerHTML = `
          <div class="card">
            <h1>${state.config.poolName || 'Polla Mundial 2026'}</h1>
            <p>Pronósticos entre amigos</p>
            <hr>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
              <button onclick="setMode('login')" style="background: #1C2438; color: var(--text);">Ingresar</button>
              <button onclick="setMode('reg')" style="background: #1C2438; color: var(--text);">Registrarme</button>
            </div>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pw" placeholder="Contraseña">
            <div id="regFields" class="hidden"><input type="text" id="name" placeholder="Tu nombre"></div>
            <button onclick="doAuth()">Continuar</button>
          </div>
        `;
      } else {
        const user = state.users[state.me];
        appEl.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
              <h1>${state.config.poolName || 'Polla Mundial 2026'}</h1>
              <p>${user?.displayName} ${user?.role === 'admin' ? '<span class="badge">ADMIN</span>' : ''}</p>
            </div>
            <button onclick="doLogout()" style="width: auto; padding: 8px 16px;">Salir</button>
          </div>
          
          <div class="tabs">
            <button class="tab-btn ${state.tab === 'partidos' ? 'active' : ''}" onclick="setTab('partidos')">Partidos</button>
            <button class="tab-btn ${state.tab === 'podio' ? 'active' : ''}" onclick="setTab('podio')">Podio</button>
            <button class="tab-btn ${state.tab === 'tabla' ? 'active' : ''}" onclick="setTab('tabla')">Tabla</button>
            ${user?.role === 'admin' ? `<button class="tab-btn ${state.tab === 'admin' ? 'active' : ''}" onclick="setTab('admin')">Admin</button>` : ''}
          </div>
          
          <div id="content"></div>
        `;

        const content = document.getElementById('content');
        if(state.tab === 'partidos') renderPartidos(content);
        else if(state.tab === 'podio') renderPodio(content);
        else if(state.tab === 'tabla') renderTabla(content);
        else if(state.tab === 'admin') renderAdmin(content);
      }
    }

    function renderPartidos(el) {
      const open = state.matches.filter(m => new Date(m.datetime).getTime() > Date.now());
      let html = `<h2>Partidos por jugar (${open.length})</h2>`;
      open.slice(0, 20).forEach(m => {
        const p = state.preds.find(x => x.userId === state.me && x.matchId === m.id);
        html += `
          <div class="match">
            <div><strong>${m.home} vs ${m.away}</strong> <span style="color: var(--muted);">Grupo ${m.group_name}</span></div>
            <div class="match-inputs">
              <input type="number" id="h_${m.id}" value="${p?.homeScore || ''}" placeholder="0" min="0">
              <span>:</span>
              <input type="number" id="a_${m.id}" value="${p?.awayScore || ''}" placeholder="0" min="0">
              <button onclick="savePred('${m.id}')" style="width: 100px; padding: 6px;">Guardar</button>
            </div>
          </div>
        `;
      });
      el.innerHTML = html;
    }

    function renderPodio(el) {
      const pod = state.podium[state.me] || {};
      const teams = [...new Set(state.matches.flatMap(m => [m.home, m.away]))].sort();
      let html = `<h2>Apuesta de Podio</h2>`;
      html += `<label>🥇 Campeón</label>
        <select id="first">
          <option value="">-- Elegir --</option>
          ${teams.map(t => `<option value="${t}" ${pod.first === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
        <label>🥈 Segundo</label>
        <select id="second">
          <option value="">-- Elegir --</option>
          ${teams.map(t => `<option value="${t}" ${pod.second === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
        <label>🥉 Tercero</label>
        <select id="third">
          <option value="">-- Elegir --</option>
          ${teams.map(t => `<option value="${t}" ${pod.third === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
        <button onclick="savePodium()">Guardar Podio</button>`;
      el.innerHTML = html;
    }

    function renderTabla(el) {
      let html = '<h2>Tabla de Posiciones</h2><table><tr><th>Usuario</th><th>Puntos</th><th>Pronósticos</th></tr>';
      Object.keys(state.users).forEach(u => {
        const pts = state.preds.filter(p => p.userId === u).length;
        html += `<tr><td>${state.users[u].displayName}</td><td>${pts * 3}</td><td>${pts}</td></tr>`;
      });
      html += '</table>';
      el.innerHTML = html;
    }

    function renderAdmin(el) {
      el.innerHTML = '<h2>Panel Admin</h2><p>En desarrollo...</p>';
    }

    window.createPool = async function() {
      const poolName = document.getElementById('poolName').value || 'Polla Mundial 2026';
      const adminName = document.getElementById('adminName').value;
      const adminPw = document.getElementById('adminPw').value;
      if(!adminName || !adminPw) return alert('Llena todos los campos');
      
      const config = { poolName, scoring: { exact: 5, outcome: 3 }, montoEntrada: 15000, moneda: 'CLP' };
      await sb.from('config').insert([{ id: '1', ...config }]);
      
      const hashPw = (s) => { let h = 5381; for(let i = 0; i < s.length; i++) h = ((h << 5) + h) + s.charCodeAt(i); return "h" + (h >>> 0).toString(16); };
      await sb.from('users').insert([{ id: 'admin', displayName: adminName, pw: hashPw(adminPw), role: 'admin', paid: false }]);
      
      state.config = config;
      state.users['admin'] = { displayName: adminName, role: 'admin' };
      state.me = 'admin';
      render();
    };

    let authMode = 'login';
    window.setMode = function(m) { authMode = m; document.getElementById('regFields')?.classList.toggle('hidden', m === 'login'); };
    
    window.doAuth = async function() {
      const user = document.getElementById('user').value.toLowerCase();
      const pw = document.getElementById('pw').value;
      const name = document.getElementById('name').value;
      
      const hashPw = (s) => { let h = 5381; for(let i = 0; i < s.length; i++) h = ((h << 5) + h) + s.charCodeAt(i); return "h" + (h >>> 0).toString(16); };
      
      if(authMode === 'login') {
        const users = await sb.from('users').select('*').eq('id', user);
        if(!users.data || !users.data.length || users.data[0].pw !== hashPw(pw)) return alert('Usuario o contraseña incorrecto');
        state.users[user] = users.data[0];
        state.me = user;
      } else {
        if(!user || !pw || !name) return alert('Llena todos los campos');
        await sb.from('users').insert([{ id: user, displayName: name, pw: hashPw(pw), role: 'participant', paid: false }]);
        state.users[user] = { displayName: name, role: 'participant' };
        state.me = user;
      }
      render();
    };

    window.doLogout = function() { state.me = null; render(); };
    window.setTab = function(t) { state.tab = t; render(); };
    
    window.savePred = async function(mid) {
      const h = document.getElementById(`h_${mid}`).value;
      const a = document.getElementById(`a_${mid}`).value;
      if(!h || !a) return alert('Completa ambos campos');
      
      const exist = state.preds.find(p => p.userId === state.me && p.matchId === mid);
      if(exist) {
        await sb.from('predictions').update({ homeScore: +h, awayScore: +a }).eq('id', exist.id);
        exist.homeScore = +h;
        exist.awayScore = +a;
      } else {
        await sb.from('predictions').insert([{ id: Date.now() + '', userId: state.me, matchId: mid, homeScore: +h, awayScore: +a }]);
        state.preds.push({ userId: state.me, matchId: mid, homeScore: +h, awayScore: +a });
      }
      render();
    };

    window.savePodium = async function() {
      const first = document.getElementById('first').value;
      const second = document.getElementById('second').value;
      const third = document.getElementById('third').value;
      
      state.podium[state.me] = { first, second, third };
      render();
    };

    init();
  </script>
</body>
</html>
